<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn btn-wide btn-gray" onclick="clearAll()">AC</button>
      <button class="btn btn-gray" onclick="toggleSign()">+/-</button>
      <button class="btn btn-gray" onclick="percentage()">%</button>
      <button class="btn btn-orange" onclick="inputOp('÷')">÷</button>

      <button class="btn" onclick="inputNum('7')">7</button>
      <button class="btn" onclick="inputNum('8')">8</button>
      <button class="btn" onclick="inputNum('9')">9</button>
      <button class="btn btn-orange" onclick="inputOp('×')">×</button>

      <button class="btn" onclick="inputNum('4')">4</button>
      <button class="btn" onclick="inputNum('5')">5</button>
      <button class="btn" onclick="inputNum('6')">6</button>
      <button class="btn btn-orange" onclick="inputOp('-')">-</button>

      <button class="btn" onclick="inputNum('1')">1</button>
      <button class="btn" onclick="inputNum('2')">2</button>
      <button class="btn" onclick="inputNum('3')">3</button>
      <button class="btn btn-orange" onclick="inputOp('+')">+</button>

      <button class="btn btn-wide" onclick="inputNum('0')">0</button>
      <button class="btn" onclick="inputDot()">.</button>
      <button class="btn btn-orange" onclick="calculate()">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
