<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GM Service Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #d9e8f5 100%);
      color: #1a1a1a;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: #f8f9fa;
      border-right: 1px solid #e5e7eb;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .sidebar-header:hover {
      background: #f0f0f0;
    }

    .sidebar-icon {
      font-size: 1.8rem;
    }

    .sidebar-title {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .sidebar-menu {
      display: grid;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      color: #5a5a5a;
      font-size: 0.95rem;
    }

    .menu-item:hover {
      background: #e8eaef;
    }

    .menu-item.active {
      background: #e8eaef;
      color: #1a1a1a;
      font-weight: 600;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 40px;
      overflow: auto;
    }

    .hero-section {
      display: grid;
      gap: 32px;
      text-align: center;
      align-items: center;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.2;
      color: #1a1a1a;
    }

    .hero-title span {
      color: #4f46e5;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 40px;
      width: 100%;
      max-width: 600px;
    }

    .service-btn {
      display: grid;
      place-items: center;
      gap: 12px;
      padding: 24px 20px;
      border: 2px solid #e5e7eb;
      border-radius: 20px;
      background: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }

    .service-btn:hover {
      border-color: #4f46e5;
      box-shadow: 0 12px 32px rgba(79, 70, 229, 0.15);
      transform: translateY(-4px);
    }

    .service-btn-icon {
      font-size: 2.4rem;
    }

    .service-btn-label {
      font-weight: 600;
      font-size: 1rem;
      color: #1a1a1a;
    }

    .input-section {
      width: 100%;
      max-width: 600px;
      display: grid;
      gap: 16px;
      align-items: center;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 14px 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #4f46e5;
      box-shadow: 0 12px 32px rgba(79, 70, 229, 0.15);
    }

    .input-plus {
      font-size: 1.4rem;
      color: #999;
      cursor: pointer;
    }

    .input-field {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a1a;
    }

    .input-field::placeholder {
      color: #999;
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s;
      font-size: 1rem;
    }

    .input-btn:hover {
      background: #e0e0e0;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
        padding: 16px 8px;
      }

      .sidebar-title,
      .menu-item span {
        display: none;
      }

      .menu-item {
        justify-content: center;
        padding: 12px;
      }

      .main-content {
        padding: 40px 20px;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-icon">🚀</span>
      <span class="sidebar-title">GM</span>
    </div>

    <div class="sidebar-menu">
      <div class="menu-item active">
        <span style="font-size: 1.2rem;">✏️</span>
        <span>새 채팅</span>
      </div>
      <div class="menu-item">
        <span style="font-size: 1.2rem;">🔍</span>
        <span>채팅 검색</span>
      </div>
      <div class="menu-item">
        <span style="font-size: 1.2rem;">📷</span>
        <span>이미지 인식</span>
      </div>
      <div class="menu-item">
        <span style="font-size: 1.2rem;">📊</span>
        <span>라이브러리</span>
      </div>
    </div>

    <div style="border-top: 1px solid #e5e7eb; padding-top: 16px; font-size: 0.9rem; color: #999;">
      <div style="font-weight: 600; margin-bottom: 12px;">노트북</div>
      <div style="display: grid; gap: 8px;">
        <div class="menu-item">
          <span style="font-size: 1rem;">+</span>
          <span>새 노트북</span>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="hero-section">
      <h1 class="hero-title">GM님,<br/>시작해 볼까요?</h1>

      <div class="service-grid">
        <a href="./calculator/index.html" class="service-btn">
          <div class="service-btn-icon">🧮</div>
          <div class="service-btn-label">계산기</div>
        </a>

        <a href="./calendar/index.html" class="service-btn">
          <div class="service-btn-icon">📅</div>
          <div class="service-btn-label">캘린더</div>
        </a>
      </div>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <span class="input-plus">+</span>
        <input
          type="text"
          class="input-field"
          placeholder="GM에게 요청하기"
          readonly
        />
        <div class="input-actions">
          <button class="input-btn">🎙️</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
