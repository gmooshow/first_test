<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GM Digital Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #91c7ff 0%, transparent 45%),
                  radial-gradient(circle at bottom left, #7c3aed 0%, transparent 35%),
                  linear-gradient(180deg, #0c1225 0%, #101a33 100%);
      color: #eef2ff;
    }

    .clock-card {
      width: min(640px, 100%);
      padding: 36px 32px;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.32);
      text-align: center;
    }

    .clock-header {
      display: grid;
      gap: 14px;
      margin-bottom: 28px;
    }

    .clock-header h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.05;
    }

    .clock-header p {
      color: #cbd5e1;
      font-size: 1rem;
    }

    .clock-display {
      display: grid;
      justify-items: center;
      gap: 18px;
      margin-top: 24px;
    }

    .time {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #ffffff;
      text-shadow: 0 24px 50px rgba(0, 0, 0, 0.22);
    }

    .date {
      color: #94a3b8;
      font-size: 1.05rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.14);
      color: #bfdbfe;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-link {
      color: #cbd5e1;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(148, 163, 184, 0.08);
      transition: background 0.2s;
    }

    .nav-link:hover {
      background: rgba(148, 163, 184, 0.16);
    }
  </style>
</head>
<body>
  <div class="clock-card">
    <div class="clock-header">
      <h1>GM Digital Clock</h1>
      <p>현재 시간과 날짜를 실시간으로 표시합니다. 깔끔한 디지털 시계 UI로 빠르게 확인하세요.</p>
    </div>

    <div class="clock-display">
      <div class="time" id="timeDisplay">00:00:00</div>
      <div class="date" id="dateDisplay">YYYY년 MM월 DD일</div>
      <div class="status" id="statusDisplay">--</div>
    </div>

    <div class="actions">
      <a class="nav-link" href="../index.html">홈으로 돌아가기</a>
      <a class="nav-link" href="../calculator/index.html">계산기로 이동</a>
      <a class="nav-link" href="../calendar/index.html">캘린더로 이동</a>
    </div>
  </div>

  <script>
    const timeDisplay = document.getElementById('timeDisplay');
    const dateDisplay = document.getElementById('dateDisplay');
    const statusDisplay = document.getElementById('statusDisplay');

    function pad(number) {
      return number.toString().padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      const hours = pad(now.getHours());
      const minutes = pad(now.getMinutes());
      const seconds = pad(now.getSeconds());
      const year = now.getFullYear();
      const month = pad(now.getMonth() + 1);
      const day = pad(now.getDate());
      const weekNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      const weekDay = weekNames[now.getDay()];

      timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
      dateDisplay.textContent = `${year}년 ${month}월 ${day}일 · ${weekDay}`;
      statusDisplay.textContent = hours < 12 ? '오전' : '오후';
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
